services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:4300:3000"
    environment:
      DATABASE_URL: postgresql://app_user:app_password@db:5432/oneonone_stable
      DATABASE_ADMIN_URL: postgresql://postgres:postgres@db:5432/oneonone_stable
      ENCRYPTION_MASTER_KEY: "${ENCRYPTION_MASTER_KEY}"
      AUTH_SECRET: "${AUTH_SECRET}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_SECURE: "${SMTP_SECURE}"
      SMTP_USERNAME: "${SMTP_USERNAME}"
      SMTP_PASSWORD: "${SMTP_PASSWORD}"
      EMAIL_FROM: "${EMAIL_FROM}"
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: https://1on1.surmont.co
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      INNGEST_DEV: "http://host.docker.internal:8288"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
